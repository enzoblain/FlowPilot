<svg width="1436" height="720" viewBox="0 0 1436 720" xmlns="http://www.w3.org/2000/svg">
  <style>
    .title { font: bold 28px sans-serif; fill: #EAEAEA; }
    .subtitle { font: 18px sans-serif; fill: #CFCFCF; }
    .boxtext { font: bold 20px sans-serif; fill: #EAEAEA; }
    .boxsub { font: 15px sans-serif; fill: #D0D0D0; }
  </style>

  <rect width="1436" height="720" fill="#1B1B1B"/>

  <!-- CLIENTS -->

  <rect x="80" y="100" width="240" height="130" rx="18" fill="#4940A7" stroke="#8E86FF"/>
  <text x="200" y="150" text-anchor="middle" class="title">iPhone</text>
  <text x="200" y="185" text-anchor="middle" class="subtitle">Application Instance</text>

  <rect x="80" y="310" width="240" height="130" rx="18" fill="#4940A7" stroke="#8E86FF"/>
  <text x="200" y="360" text-anchor="middle" class="title">MacBook Air</text>
  <text x="200" y="395" text-anchor="middle" class="subtitle">Application Instance</text>

  <rect x="80" y="520" width="240" height="130" rx="18" fill="#4940A7" stroke="#8E86FF"/>
  <text x="200" y="570" text-anchor="middle" class="title">Other Device</text>
  <text x="200" y="605" text-anchor="middle" class="subtitle">Application Instance</text>

  <!-- CONNECTIONS -->

  <line x1="320" y1="165" x2="438" y2="300" stroke="#8E86FF" stroke-width="2"/>
  <line x1="320" y1="375" x2="438" y2="355" stroke="#8E86FF" stroke-width="2"/>
  <line x1="320" y1="585" x2="438" y2="410" stroke="#8E86FF" stroke-width="2"/>

