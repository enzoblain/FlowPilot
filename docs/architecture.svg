        x2="1200"
        y2="285"
        stroke="#D17855"
        stroke-width="2"/>

  <!-- STEP 2 -->

  <rect x="1080" y="285"
        width="240"
        height="100"
        rx="18"
        fill="#7A2E12"
        stroke="#D17855"/>

  <text x="1200"
        y="337"
        text-anchor="middle"
        class="boxtext">
    AI Processing
  </text>

  <text x="1200"
        y="365"
        text-anchor="middle"
        class="boxsub">
