  </text>

  <rect x="620" y="670" width="22" height="22" rx="4" fill="#A89DFF"/>
  <text x="655" y="687" class="subtitle">
    Application Instances
  </text>

  <rect x="980" y="670" width="22" height="22" rx="4" fill="#F2A07E"/>
  <text x="1015" y="687" class="subtitle">
    Example Module
  </text>

