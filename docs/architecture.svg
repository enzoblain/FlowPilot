  </text>

  <line x1="1200"
        y1="385"
        x2="1200"
        y2="450"
        stroke="#D17855"
        stroke-width="2"/>

  <!-- STEP 3 -->

  <rect x="1080" y="450"
        width="240"
        height="100"
        rx="18"
        fill="#7A2E12"
        stroke="#D17855"/>

  <text x="1200"
        y="502"
        text-anchor="middle"
        class="boxtext">
    Store &amp; Index
  </text>

  <text x="1200"
        y="530"
        text-anchor="middle"
        class="boxsub">
